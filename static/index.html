<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TelhaTech AI</title>

<link rel="manifest" href="/static/manifest.json">

<style>

body{
font-family: Arial, sans-serif;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:#1e293b;
padding:40px;
border-radius:16px;
text-align:center;
width:90%;
max-width:420px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.logo{
width:90px;
margin-bottom:15px;
}

h1{
color:#f97316;
margin-bottom:10px;
}

p{
color:#cbd5f5;
font-size:14px;
margin-bottom:20px;
}

.upload{
border:2px dashed #f97316;
padding:30px;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

.upload:hover{
background:#334155;
}

button{
margin-top:20px;
background:#f97316;
border:none;
padding:14px;
border-radius:8px;
color:white;
font-size:16px;
cursor:pointer;
width:100%;
}

button:hover{
background:#ea580c;
}

.install{
margin-top:15px;
background:#2563eb;
}

.install:hover{
background:#1d4ed8;
}

.preview{
margin-top:20px;
max-width:100%;
border-radius:10px;
}

#resultado{
margin-top:20px;
font-size:18px;
color:white;
}

</style>
</head>

<body>

<div class="container">

<img src="/static/icon.png" class="logo">

<h1>TelhaTech AI</h1>

<p>Detecção inteligente de telhados com IA</p>

<form id="formulario">

<label class="upload">
<input type="file" id="fileInput" hidden required>
Clique para enviar uma imagem
</label>

<button type="submit">
Analisar Telhado
</button>

</form>

<img id="preview" class="preview">

<div id="resultado"></div>

<button id="installBtn" class="install" style="display:none">
Instalar Aplicativo
</button>

</div> 

<script>

const fileInput = document.getElementById("fileInput");
const preview = document.getElementById("preview");

document.querySelector(".upload").onclick = () => fileInput.click();

fileInput.onchange = function(e){
preview.src = URL.createObjectURL(e.target.files[0]);
};

const form = document.getElementById("formulario");

form.addEventListener("submit", async function(e){

e.preventDefault();

const file = fileInput.files[0];

let formData = new FormData();
formData.append("file", file);

document.getElementById("resultado").innerHTML = "Analisando imagem...";

const resposta = await fetch("/predict",{
method:"POST",
body:formData
});

const dados = await resposta.json();

document.getElementById("resultado").innerHTML =
"Total de telhados: " + dados["Total de telhados"] + "<br>" +
"Telhados de cerâmica: " + dados["Telhados de cerâmica"] + "<br>" +
"Telhados de brasilit: " + dados["Telhados de brasilit"];

});

let deferredPrompt;

window.addEventListener("beforeinstallprompt", function(e){

e.preventDefault();

deferredPrompt = e;

document.getElementById("installBtn").style.display="block";

});

document.getElementById("installBtn").onclick = async function(){

if(deferredPrompt){
deferredPrompt.prompt();
}

};

if("serviceWorker" in navigator){
navigator.serviceWorker.register("/static/sw.js");
}

</script>

</body>
</html>
