<!DOCTYPE html>

<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TelhaTech AI</title>

<link rel="manifest" href="/static/manifest.json">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#020c25;
color:white;
}

/* layout */

.app{
display:flex;
height:100vh;
}

/* menu lateral */

.sidebar{
width:220px;
background:#0a1f44;
padding:20px;
display:flex;
flex-direction:column;
}

.sidebar h2{
color:#ff7a00;
margin-bottom:20px;
}

.sidebar button{
background:none;
border:none;
color:white;
padding:12px;
text-align:left;
font-size:16px;
cursor:pointer;
border-radius:8px;
margin-bottom:8px;
}

.sidebar button:hover{
background:#ff7a00;
}

/* conteúdo */

.conteudo{
flex:1;
padding:40px;
}

/* páginas */

.pagina{
display:none;
background:#02143a;
padding:30px;
border-radius:15px;
max-width:600px;
}

#analise{
display:block;
}

/* botões */

.botao{
background:#ff7a00;
border:none;
padding:12px;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

.botao:hover{
background:#e56d00;
}

/* histórico */

#listaHistorico img{
width:150px;
margin:10px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="app">

<!-- MENU LATERAL -->

<div class="sidebar">

<h2>TelhaTech</h2>

<button onclick="abrirPagina('analise')">🔍 Analisar</button>

<button onclick="abrirPagina('historico')">🕘 Histórico</button>

<button onclick="abrirPagina('sobre')">ℹ️ Sobre</button>

</div>

<!-- CONTEÚDO -->

<div class="conteudo">

<!-- ANALISAR -->

<div id="analise" class="pagina">

<h1>TelhaTech AI</h1>

<p>Análise inteligente de telhados com Inteligência Artificial</p>

<input type="file" id="fileInput">

<br><br>

<button class="botao" onclick="enviarImagem()">Analisar Telhado</button>

<br>

<button id="installBtn" class="botao" style="display:none">
Instalar App
</button>

<br><br>

<img id="resultado" style="max-width:100%">

</div>

<!-- HISTÓRICO -->

<div id="historico" class="pagina">

<h2>Histórico de análises</h2>

<div id="listaHistorico"></div>

</div>

<!-- SOBRE -->

<div id="sobre" class="pagina">

<h2>Sobre</h2>

<p>O TelhaTech AI utiliza visão computacional para detectar tipos de telhados automaticamente.</p>

</div>

</div>

</div>

<script>

/* trocar abas */

function abrirPagina(nome){

const paginas = document.querySelectorAll(".pagina")

paginas.forEach(function(p){
p.style.display="none"
})

document.getElementById(nome).style.display="block"

}

/* enviar imagem */

async function enviarImagem(){

const file = document.getElementById("fileInput").files[0]

let formData = new FormData()

formData.append("file", file)

const response = await fetch("/predict",{
method:"POST",
body:formData
})

const data = await response.json()

document.getElementById("resultado").src = data.image

}

/* carregar histórico */

async function carregarHistorico(){

try{

const res = await fetch("/history")

const imagens = await res.json()

const div = document.getElementById("listaHistorico")

div.innerHTML=""

imagens.forEach(function(img){

let imagem = document.createElement("img")

imagem.src = img

div.appendChild(imagem)

})

}catch(e){

console.log("histórico vazio")

}

}

carregarHistorico()

/* botão instalar PWA */

let deferredPrompt;

const installBtn = document.getElementById("installBtn");

window.addEventListener("beforeinstallprompt", (e) => {

e.preventDefault();

deferredPrompt = e;

installBtn.style.display = "block";

});

installBtn.addEventListener("click", async () => {

if(!deferredPrompt) return;

deferredPrompt.prompt();

const choice = await deferredPrompt.userChoice;

if(choice.outcome === "accepted"){

console.log("App instalado");

}

deferredPrompt = null;

});

/* registrar service worker */

if("serviceWorker" in navigator){
navigator.serviceWorker.register("/static/sw.js")
}

</script>

</body>
</html>
